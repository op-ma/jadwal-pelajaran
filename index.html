    function exportLihatJadwalExcel() {
      if(!AppState.lihatFilter) return showToast('Pilih filter', 'warning');
      const d = AppState.data; const hariAktif = ['Senin','Selasa','Rabu','Kamis','Jumat', 'Sabtu'].slice(0, d.dashboard.banyakHari); const maxJam = d.dashboard.jamMaksimum; 
      let ws_data = [[`JADWAL PER ${AppState.lihatMode.toUpperCase()}: ${AppState.lihatFilter.toUpperCase()}`], [], ["Jam Ke", "Waktu", ...hariAktif]];
      
      for(let i=1; i<=maxJam; i++) {
          let row = [i]; let wRef = d.waktuDetail['Senin'] ? d.waktuDetail['Senin'].find(x => x.jamKe === i) : null; row.push(wRef ? `${wRef.mulai} - ${wRef.selesai}` : '-');
          hariAktif.forEach(hari => {
              let w = (d.waktuDetail[hari] || []).find(x => x.jamKe === i); if(!w) { row.push("-"); return; } if(w.tipe === 'istirahat') { row.push("ISTIRAHAT"); return; }
              
              let items = d.jadwal.filter(j => j.hari === hari && j.jam === i); 
              if(AppState.lihatMode === 'guru') items = items.filter(j => j.guru === AppState.lihatFilter); 
              else if(AppState.lihatMode === 'mapel') items = items.filter(j => j.mapel === AppState.lihatFilter);
              else if(AppState.lihatMode === 'kelas') items = items.filter(j => j.kelas === AppState.lihatFilter);

              if(items.length > 0) { 
                  row.push(items.map(item => {
                      if (AppState.lihatMode === 'guru') return `${item.mapel} (Kls ${item.kelas})`;
                      else if (AppState.lihatMode === 'mapel') return `${item.guru} (Kls ${item.kelas})`;
                      else {
                          // FORMAT EXCEL PER KELAS: Kembali normal tanpa tingkat
                          return `${item.mapel} - ${item.guru}`;
                      }
                  }).join(' | ')); 
              } else { 
                  row.push("KOSONG"); 
              }
          }); 
          ws_data.push(row);
      }
      let wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws_data), "Jadwal Filter"); XLSX.writeFile(wb, `Jadwal_${AppState.lihatMode}_${AppState.lihatFilter}.xlsx`);
    }

    function exportLihatJadwalPDF() {
      if(!AppState.lihatFilter) return showToast('Pilih filter', 'warning');
      const element = document.getElementById('print-area-jadwal'); const titleEl = document.getElementById('pdf-title'); titleEl.style.display = 'block';
      html2pdf().set({ margin: 0.3, filename: `Jadwal_${AppState.lihatMode}_${AppState.lihatFilter}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' } }).from(element).save().then(() => { titleEl.style.display = 'none'; showToast('File PDF diunduh!', 'success'); });
    }

    function backupData() { const dataStr = JSON.stringify(AppState.data, null, 2); const blob = new Blob([dataStr], { type: "application/json" }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `Backup_JadwalKu_${new Date().toISOString().split('T')[0]}.json`; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url); showToast('File Backup diunduh!', 'success'); }
    function triggerRestore() { document.getElementById('restore-file-input').click(); }
    function processRestore(event) {
        const file = event.target.files[0]; if (!file) return; const reader = new FileReader();
        reader.onload = function(e) {
            try { const parsedData = JSON.parse(e.target.result); if (!parsedData.dashboard || !parsedData.waktuDetail) throw new Error("Format invalid"); if (confirm('PERINGATAN! Data saat ini DITIMPA dengan backup. Lanjut?')) { AppState.data = parsedData; saveDB(AppState.data); showToast('Restore berhasil!', 'success'); setTimeout(() => location.reload(), 1000); } } catch (err) { showToast('Format tidak valid!', 'error'); }
        }; reader.readAsText(file); event.target.value = '';
    }

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(() => {}); }); }
    window.onload = init;
  </script>
</body>
